name: Firestore Rules Tests

on:
  pull_request:
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [ main, master ]
    paths:
      - 'firestore.rules'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  rules-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore permission matrix tests
        run: npm run test:rules
